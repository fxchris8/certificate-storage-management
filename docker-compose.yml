version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: certificate-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-certificate_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - certificate-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: certificate-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${BACKEND_PORT:-5000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-certificate_db}
      SHADOW_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-certificate_db}_shadow
      JWT_SECRET: ${JWT_SECRET}
      WHITE_LIST_URLS: ${WHITE_LIST_URLS:-http://localhost:3000,http://localhost:5173,http://localhost:5176,http://localhost:5000,http://localhost:8080}
      SSO_FRONTEND_URL: ${SSO_FRONTEND_URL:-http://localhost:5173}
      SSO_BASE_URL: ${SSO_BASE_URL:-http://host.docker.internal:5000}
      SSO_CLIENT_ID: ${SSO_CLIENT_ID}
      SSO_CLIENT_SECRET: ${SSO_CLIENT_SECRET}
      SSO_CALLBACK_URL: ${SSO_CALLBACK_URL:-http://localhost:5001/api/auth/sso/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5176}
    ports:
      - "${BACKEND_PORT:-5000}:5001"
      - "5556:5555" # For Prisma Studio (optional)
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - certificate-network
    volumes:
      - ./backend/prisma:/app/prisma

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
    container_name: certificate-frontend
    restart: unless-stopped
    # ports:
    # - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - certificate-network

  # OCR Service
  ocr:
    build:
      context: ./ocr
      dockerfile: Dockerfile
    container_name: certificate-ocr
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: 1
    ports:
      - "${OCR_PORT:-8000}:8000"
    networks:
      - certificate-network
    volumes:
      - ./ocr/samples:/app/samples
      - ./ocr/results:/app/results

networks:
  certificate-network:
    driver: bridge

volumes:
  postgres_data:
