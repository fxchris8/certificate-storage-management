<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR Certificate Test</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 { color: #333; margin-bottom: 20px; }
        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            background: #fff;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .upload-area:hover { border-color: #007bff; }
        .upload-area.dragover { border-color: #007bff; background: #f0f7ff; }
        #fileInput { display: none; }
        #preview {
            max-width: 100%;
            max-height: 300px;
            margin-top: 20px;
            border-radius: 4px;
            display: none;
        }
        button {
            background: #007bff;
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .result {
            margin-top: 20px;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            display: none;
        }
        .result.show { display: block; }
        .result h3 { margin-top: 0; color: #333; }
        .result-item { margin: 10px 0; }
        .result-item label { font-weight: bold; color: #666; }
        .result-item span { display: block; margin-top: 4px; font-size: 18px; }
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        .status.auto_approved { background: #d4edda; color: #155724; }
        .status.needs_review { background: #fff3cd; color: #856404; }
        .status.failed { background: #f8d7da; color: #721c24; }
        .loading { color: #666; font-style: italic; }
        .error { color: #dc3545; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>OCR Certificate Test</h1>

    <div class="upload-area" id="uploadArea">
        <p>Drag & drop image here or click to select</p>
        <input type="file" id="fileInput" accept="image/jpeg,image/png,image/jpg">
        <img id="preview" src="" alt="Preview">
    </div>

    <button id="submitBtn" disabled>Extract Training Name</button>

    <div class="result" id="result">
        <h3>Result</h3>
        <div class="result-item">
            <label>Training Name:</label>
            <span id="trainingName"></span>
        </div>
        <div class="result-item">
            <label>Confidence (Training Name):</label>
            <span id="confidence"></span>
        </div>
        <div class="result-item">
            <label>Certificate No:</label>
            <span id="certificateId"></span>
        </div>
        <div class="result-item">
            <label>Confidence (Certificate No):</label>
            <span id="confidenceId"></span>
        </div>
        <div class="result-item">
            <label>Status:</label>
            <span id="status"></span>
        </div>
        <div class="result-item">
            <label>Raw Text:</label>
            <span id="rawText" style="font-size: 14px; color: #666;"></span>
        </div>
    </div>

    <div class="error" id="error"></div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const submitBtn = document.getElementById('submitBtn');
        const resultDiv = document.getElementById('result');
        const errorDiv = document.getElementById('error');

        let selectedFile = null;

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                handleFile(file);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            selectedFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                preview.src = e.target.result;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
            submitBtn.disabled = false;
            resultDiv.classList.remove('show');
            errorDiv.textContent = '';
        }

        submitBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';
            errorDiv.textContent = '';
            resultDiv.classList.remove('show');

            const formData = new FormData();
            formData.append('image', selectedFile);

            try {
                const response = await fetch('/ocr/extract', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    const d = data.data;

                    document.getElementById('trainingName').textContent = d.training_name;
                    document.getElementById('confidence').textContent = (d.confidence * 100).toFixed(1) + '%';

                    document.getElementById('certificateId').textContent = d.certificate_id || '-';
                    document.getElementById('confidenceId').textContent = d.certificate_id
                        ? (d.confidence_id * 100).toFixed(1) + '%'
                        : '-';

                    document.getElementById('rawText').textContent = d.raw_text || '-';

                    const statusEl = document.getElementById('status');
                    statusEl.innerHTML = `<span class="status ${d.status}">${d.status.replace('_', ' ')}</span>`;

                    resultDiv.classList.add('show');
                } else {
                    errorDiv.textContent = 'Error: ' + (data.error || 'Unknown error');
                }
            } catch (err) {
                errorDiv.textContent = 'Error: ' + err.message;
            }

            submitBtn.disabled = false;
            submitBtn.textContent = 'Extract Training Name';
        });
    </script>
</body>
</html>
